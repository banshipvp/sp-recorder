name: Build macOS App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # needed to create/upload release assets

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ── Build unsigned DMGs for Apple Silicon and Intel ──────────────────
      - name: Build Apple Silicon (arm64)
        run: npm run build:mac-arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Leave CSC_LINK unset → electron-builder skips signing automatically
          # Users will need to right-click → Open to bypass Gatekeeper

      - name: Build Intel (x64)
        run: npm run build:mac-x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── List produced artefacts for debugging ────────────────────────────
      - name: List dist/
        run: ls -lh dist/

      # ── Upload to GitHub Release ──────────────────────────────────────────
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Upload as workflow artifact (for manual / dispatch builds) ────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SP-Recorder-dmg
          path: dist/*.dmg
          retention-days: 30
